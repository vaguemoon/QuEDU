<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>太平國小資源班學習系統</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<link rel="stylesheet" href="shared.css">

<!-- 防閃爍：同步套用主題 -->
<script>
(function(){var M={blue:'#eef5fc,#4a90d9,#2d6fa8,#e8f4fd',green:'#edfbf4,#27ae60,#1e8449,#d5f5e3',
  purple:'#f3f0fc,#8e44ad,#6c3483,#e8daef',orange:'#fff8f0,#e67e22,#ca6f1e,#fdebd0',
  teal:'#f0fafa,#16a085,#0e6655,#d1f2eb',pink:'#fff0f8,#d63384,#a0255e,#fce4ec'};
  try{var v=(M[localStorage.getItem('theme')]||M.blue).split(','),r=document.documentElement.style;
  ['--bg','--blue','--blue-dk','--blue-lt'].forEach(function(k,i){r.setProperty(k,v[i]);});}catch(e){}})();
</script>

<style>
/* ════════════════════════════
   主系統專屬樣式
   ════════════════════════════ */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

/* ── 登入畫面 ── */
#screen-login {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: linear-gradient(160deg, #1a3a5c, #2d6fa8, #4a90d9);
  padding: 24px;
  transition: opacity .3s ease;
}
#screen-login.hidden { opacity: 0; pointer-events: none; }

.login-card {
  background: white; border-radius: 24px;
  padding: 36px 28px; width: 100%; max-width: 360px;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
}
.login-school {
  font-size: .85rem; font-weight: 700; color: var(--muted);
  letter-spacing: 2px; text-align: center; margin-bottom: 6px;
}
.login-title {
  font-size: 1.6rem; font-weight: 900; color: var(--blue-dk);
  text-align: center; margin-bottom: 28px;
}
.login-title span { color: var(--orange); }

.login-field { margin-bottom: 16px; }
.login-label {
  font-size: .78rem; font-weight: 800; color: var(--muted);
  display: block; margin-bottom: 6px; letter-spacing: .5px;
}
.login-input {
  width: 100%; border: 2.5px solid #d4e8f8; border-radius: 12px;
  padding: 12px 16px; font-size: 1rem;
  font-family: 'Noto Sans TC', sans-serif;
  outline: none; transition: border-color .2s; color: var(--text);
}
.login-input:focus { border-color: var(--blue); }

/* PIN 鍵盤 */
.pin-display {
  display: flex; gap: 10px; justify-content: center;
  margin: 8px 0 16px;
}
.pin-dot {
  width: 14px; height: 14px; border-radius: 50%;
  background: #d4e8f8; transition: background .15s;
}
.pin-dot.filled { background: var(--blue); }

.pin-pad {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 10px; margin-bottom: 20px;
}
.pin-key {
  background: var(--blue-lt); border: none; border-radius: 14px;
  padding: 16px; font-size: 1.3rem; font-weight: 900;
  color: var(--blue-dk); cursor: pointer;
  font-family: 'Nunito', sans-serif;
  transition: all .12s;
}
.pin-key:active { transform: scale(.92); background: #d0e8f8; }
.pin-key.del { font-size: 1rem; background: #fff0f0; color: var(--red); }
.pin-key.empty { visibility: hidden; }

.btn-login {
  width: 100%; padding: 15px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, var(--blue), var(--blue-dk));
  color: white; font-size: 1.05rem; font-weight: 900;
  cursor: pointer; transition: all .15s;
  font-family: 'Nunito', sans-serif;
  box-shadow: 0 4px 14px rgba(45,111,168,.35);
}
.btn-login:disabled { opacity: .5; cursor: not-allowed; }
.btn-login:not(:disabled):active { transform: scale(.97); }

.login-error {
  text-align: center; font-size: .85rem; font-weight: 700;
  color: var(--red); margin-top: 12px; min-height: 22px;
}
.teacher-link {
  text-align: center; margin-top: 20px;
  font-size: .78rem; color: rgba(255,255,255,.6);
  cursor: pointer; font-weight: 700;
}
.teacher-link:hover { color: white; }

/* ── 主系統外殼（登入後顯示） ── */
#app-shell {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transition: opacity .3s ease;
}
#app-shell.visible { opacity: 1; pointer-events: all; }

/* ── 主 Topbar（永遠屬於主系統） ── */
#main-topbar {
  display: flex; align-items: center;
  background: white; padding: 11px 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.06);
  z-index: 100; flex-shrink: 0; gap: 12px;
}
.topbar-logo {
  font-size: .85rem; font-weight: 900; color: var(--blue-dk);
  white-space: nowrap;
}
.topbar-logo span { color: var(--orange); }
.topbar-spacer { flex: 1; }
.topbar-student {
  display: flex; align-items: center; gap: 8px;
  background: var(--blue-lt); border-radius: 20px;
  padding: 6px 14px; cursor: pointer;
  border: 1.5px solid #bfdbfe; transition: all .15s;
}
.topbar-student:active { transform: scale(.96); }
.topbar-student-avatar { font-size: 1.2rem; }
.topbar-student-name {
  font-size: .85rem; font-weight: 800; color: var(--blue-dk);
}
.topbar-back {
  display: none;
  background: var(--blue-lt); border: none; border-radius: 14px;
  padding: 8px 16px; font-size: .9rem; font-weight: 900;
  color: var(--blue-dk); cursor: pointer;
  font-family: 'Nunito', sans-serif;
  transition: all .15s;
}
.topbar-back.show { display: block; }
.topbar-back:active { transform: scale(.95); }

/* ── 主頁（Hub） ── */
#screen-hub {
  flex: 1; overflow-y: auto;
  padding: 24px 16px 40px;
  display: flex; flex-direction: column; gap: 20px;
}
.hub-welcome {
  background: white; border-radius: 20px;
  padding: 20px; box-shadow: 0 4px 20px rgba(74,144,217,.1);
  display: flex; align-items: center; gap: 14px;
}
.hub-avatar { font-size: 2.8rem; }
.hub-greeting { font-size: .85rem; font-weight: 700; color: var(--muted); }
.hub-name { font-size: 1.3rem; font-weight: 900; color: var(--text); }

.hub-section-label {
  font-size: .8rem; font-weight: 800; color: var(--muted);
  letter-spacing: 1px;
}
#subjects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 14px;
}
.subject-card {
  background: white; border-radius: 20px;
  padding: 22px 16px 18px;
  box-shadow: 0 4px 20px rgba(74,144,217,.1);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  cursor: pointer; transition: all .18s;
  border: 3px solid transparent;
}
.subject-card:active { transform: scale(.95); }
.subject-card:hover { transform: translateY(-4px); box-shadow: 0 8px 28px rgba(74,144,217,.2); }
.subject-card.theme-blue  { border-color: #b3d7f5; }
.subject-card.theme-green { border-color: #a8e6c1; }
.subject-card.theme-orange{ border-color: #ffc9a0; }
.subject-icon { font-size: 2.2rem; }
.subject-name { font-size: .95rem; font-weight: 900; color: var(--text); }
.subject-desc { font-size: .72rem; color: var(--muted); font-weight: 600; text-align: center; }
.subject-badge {
  font-size: .68rem; font-weight: 800; padding: 3px 10px;
  border-radius: 20px; margin-top: 4px;
}
.subject-badge.green  { background: #e8f8ee; color: var(--green-dk); }
.subject-badge.orange { background: #fff3e0; color: #b05000; }

/* ── iframe 外殼（子項目在這裡運行） ── */
#subject-shell {
  position: absolute; inset: 0;
  flex-direction: column;
  display: none;
}
#subject-shell.open { display: flex; }

#subject-topbar {
  display: flex; align-items: center;
  background: white; padding: 11px 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.06);
  z-index: 100; flex-shrink: 0; gap: 12px;
}
.subject-topbar-back {
  background: var(--blue-lt); border: none; border-radius: 14px;
  padding: 10px 20px; font-size: 1rem; font-weight: 900;
  color: var(--blue-dk); cursor: pointer;
  font-family: 'Nunito', sans-serif;
  box-shadow: 0 2px 8px rgba(74,144,217,.18);
  transition: all .15s; white-space: nowrap;
}
.subject-topbar-back:active { transform: scale(.95); }
.subject-topbar-title {
  font-size: .95rem; font-weight: 900; color: var(--blue-dk);
}
.subject-topbar-title span { color: var(--orange); }
.subject-topbar-spacer { flex: 1; }
.subject-topbar-settings {
  background: var(--blue-lt); border: none; border-radius: 14px;
  padding: 8px 14px; font-size: .82rem; font-weight: 900;
  color: var(--blue-dk); cursor: pointer;
  font-family: 'Nunito', sans-serif;
  box-shadow: 0 2px 8px rgba(74,144,217,.18);
  transition: all .15s; white-space: nowrap;
}
.subject-topbar-settings:active { transform: scale(.95); }

#subject-iframe {
  flex: 1; border: none; width: 100%;
  background: var(--bg);
}

/* ── 個人設定面板（從右側滑入） ── */
#screen-profile {
  position: absolute; inset: 0;
  background: var(--bg); overflow-y: auto;
  transform: translateX(100%);
  transition: transform .35s cubic-bezier(.77,0,.175,1);
  z-index: 200;
}
#screen-profile.open { transform: translateX(0); }

.profile-topbar {
  background: white; padding: 13px 16px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
  position: sticky; top: 0; z-index: 10;
}
.profile-topbar-back {
  background: var(--blue-lt); border: none; border-radius: 14px;
  padding: 8px 16px; font-size: .9rem; font-weight: 900;
  color: var(--blue-dk); cursor: pointer;
  font-family: 'Nunito', sans-serif; transition: all .15s;
}
.profile-topbar-back:active { transform: scale(.95); }
.profile-topbar-title {
  font-size: 1rem; font-weight: 900; color: var(--blue-dk);
}

.profile-body { padding: 20px 16px 60px; display: flex; flex-direction: column; gap: 16px; }

.profile-card {
  background: white; border-radius: 18px;
  padding: 18px 16px; box-shadow: 0 4px 20px rgba(74,144,217,.08);
}
.profile-card-title {
  font-size: .82rem; font-weight: 800; color: var(--muted);
  letter-spacing: 1px; margin-bottom: 14px;
}
.profile-input {
  width: 100%; border: 2px solid #d4e8f8; border-radius: 10px;
  padding: 11px 14px; font-size: .95rem;
  font-family: 'Noto Sans TC', sans-serif;
  outline: none; color: var(--text); transition: border-color .2s;
}
.profile-input:focus { border-color: var(--blue); }

.avatar-grid {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
}
.avatar-btn {
  font-size: 1.8rem; background: var(--blue-lt); border: 3px solid transparent;
  border-radius: 14px; padding: 8px; cursor: pointer; transition: all .15s;
  text-align: center;
}
.avatar-btn.selected { border-color: var(--blue); background: #d0e8f8; }
.avatar-btn:active { transform: scale(.9); }

/* 音效開關 */
.sound-row { display: flex; align-items: center; justify-content: space-between; }
.sound-label { font-size: .92rem; font-weight: 800; color: var(--text); }
.sound-sub { font-size: .75rem; color: var(--muted); font-weight: 600; margin-top: 2px; }
.sound-toggle {
  width: 52px; height: 28px; border-radius: 20px; border: none;
  cursor: pointer; position: relative; transition: background .25s;
}
.sound-toggle-knob {
  position: absolute; top: 3px; width: 22px; height: 22px;
  border-radius: 50%; background: white;
  transition: left .25s; box-shadow: 0 2px 4px rgba(0,0,0,.2);
}

/* 主題格 */
.theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.theme-btn {
  border: 3px solid transparent; border-radius: 14px;
  padding: 12px 8px; cursor: pointer; text-align: center;
  font-size: .78rem; font-weight: 800; transition: all .15s;
  font-family: 'Nunito', 'Noto Sans TC', sans-serif;
}
.theme-btn.selected { border-color: var(--blue); }
.theme-btn:active { transform: scale(.95); }

.btn-profile-save {
  width: 100%; padding: 15px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, var(--blue), var(--blue-dk));
  color: white; font-size: 1rem; font-weight: 900;
  cursor: pointer; font-family: 'Nunito', sans-serif;
  box-shadow: 0 4px 14px rgba(45,111,168,.3); transition: all .15s;
}
.btn-profile-save:active { transform: scale(.97); }

.logout-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 0;
}
.btn-logout {
  background: #fff0f0; border: none; border-radius: 10px;
  padding: 8px 16px; font-size: .85rem; font-weight: 800;
  color: var(--red); cursor: pointer;
  font-family: 'Nunito', sans-serif; transition: all .15s;
}
.btn-logout:active { transform: scale(.95); }

/* 教師登入彈窗 */
#teacher-modal {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,.5);
  display: none; align-items: center; justify-content: center;
  padding: 20px;
}
#teacher-modal.open { display: flex; }
.teacher-modal-box {
  background: white; border-radius: 20px;
  padding: 28px 24px; width: 100%; max-width: 320px;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
}
.teacher-modal-title {
  font-size: 1.1rem; font-weight: 900; color: var(--text);
  text-align: center; margin-bottom: 16px;
}
.teacher-modal-input {
  width: 100%; border: 2px solid #d4e8f8; border-radius: 10px;
  padding: 11px 14px; font-size: 1rem; outline: none;
  font-family: 'Noto Sans TC', sans-serif; color: var(--text);
  margin-bottom: 12px; transition: border-color .2s;
}
.teacher-modal-input:focus { border-color: var(--blue); }
.teacher-modal-btns { display: flex; gap: 10px; }
.btn-modal-cancel {
  flex: 1; padding: 12px; border: none; border-radius: 12px;
  background: #f0f4f8; color: var(--muted); font-weight: 800;
  cursor: pointer; font-family: 'Nunito', sans-serif;
}
.btn-modal-ok {
  flex: 2; padding: 12px; border: none; border-radius: 12px;
  background: linear-gradient(135deg, var(--blue), var(--blue-dk));
  color: white; font-weight: 900;
  cursor: pointer; font-family: 'Nunito', sans-serif;
}
.teacher-modal-error {
  font-size: .82rem; color: var(--red); font-weight: 700;
  text-align: center; margin-bottom: 10px; min-height: 20px;
}

/* Toast */
#toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--text); color: white;
  border-radius: 10px; padding: 11px 22px;
  font-size: .9rem; font-weight: 700;
  opacity: 0; transition: all .3s ease;
  z-index: 9999; white-space: nowrap;
  pointer-events: none;
}
#toast.show {
  opacity: 1; transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<!-- ════ 登入畫面 ════ -->
<div id="screen-login">
  <div class="login-card">
    <div class="login-school">臺東縣太平國小資源班</div>
    <div class="login-title">學習<span>系統</span></div>

    <div class="login-field">
      <label class="login-label" for="login-name">學生姓名</label>
      <input class="login-input" id="login-name" type="text"
        placeholder="請輸入姓名" autocomplete="off"
        oninput="onLoginInput()">
    </div>

    <div class="login-field">
      <label class="login-label">PIN 碼</label>
      <div class="pin-display" id="pin-display">
        <div class="pin-dot" id="pd0"></div>
        <div class="pin-dot" id="pd1"></div>
        <div class="pin-dot" id="pd2"></div>
        <div class="pin-dot" id="pd3"></div>
      </div>
      <div class="pin-pad">
        <button class="pin-key" onclick="pinInput(1)">1</button>
        <button class="pin-key" onclick="pinInput(2)">2</button>
        <button class="pin-key" onclick="pinInput(3)">3</button>
        <button class="pin-key" onclick="pinInput(4)">4</button>
        <button class="pin-key" onclick="pinInput(5)">5</button>
        <button class="pin-key" onclick="pinInput(6)">6</button>
        <button class="pin-key" onclick="pinInput(7)">7</button>
        <button class="pin-key" onclick="pinInput(8)">8</button>
        <button class="pin-key" onclick="pinInput(9)">9</button>
        <button class="pin-key empty"></button>
        <button class="pin-key" onclick="pinInput(0)">0</button>
        <button class="pin-key del" onclick="pinDel()">⌫</button>
      </div>
    </div>

    <button class="btn-login" id="btn-login" disabled onclick="doLogin()">登入</button>
    <div class="login-error" id="login-error"></div>
  </div>
  <div class="teacher-link" onclick="openTeacherModal()">教師入口</div>
</div>

<!-- ════ 主系統外殼（登入後） ════ -->
<div id="app-shell">

  <!-- 主 Hub -->
  <div id="main-topbar">
    <div class="topbar-logo">太平國小<span>學習系統</span></div>
    <div class="topbar-spacer"></div>
    <div class="topbar-student" id="topbar-student" onclick="openProfile()">
      <span class="topbar-student-avatar" id="topbar-avatar">🐣</span>
      <span class="topbar-student-name" id="topbar-name">—</span>
    </div>
  </div>

  <div id="screen-hub">
    <div class="hub-welcome">
      <div class="hub-avatar" id="hub-avatar">🐣</div>
      <div>
        <div class="hub-greeting">안녕하세요！歡迎回來</div>
        <div class="hub-name" id="hub-name">—</div>
      </div>
    </div>

    <div class="hub-section-label">📚 學習區</div>
    <div id="subjects-grid"></div>
  </div>

  <!-- 子項目外殼：topbar 屬於主系統，iframe 完全隔離 -->
  <div id="subject-shell">
    <div id="subject-topbar">
      <button class="subject-topbar-back" onclick="closeSubject()">← 回首頁</button>
      <div class="subject-topbar-title" id="subject-topbar-title">—</div>
      <div class="subject-topbar-spacer"></div>
      <button class="subject-topbar-settings" onclick="openProfile()">⚙️ 設定</button>
    </div>
    <iframe id="subject-iframe" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
  </div>

  <!-- 個人設定（滑入層） -->
  <div id="screen-profile">
    <div class="profile-topbar">
      <button class="profile-topbar-back" onclick="closeProfile()">← 返回</button>
      <div class="profile-topbar-title">我的資料</div>
    </div>
    <div class="profile-body">

      <div class="profile-card">
        <div class="profile-card-title">👤 基本資料</div>
        <div style="font-size:.82rem;font-weight:700;color:var(--muted);margin-bottom:6px">姓名</div>
        <div id="profile-real-name" style="font-size:1rem;font-weight:900;color:var(--text);margin-bottom:14px">—</div>
        <div style="font-size:.82rem;font-weight:700;color:var(--muted);margin-bottom:6px">暱稱（選填）</div>
        <input class="profile-input" id="profile-nickname" type="text" placeholder="輸入暱稱…" maxlength="10">
      </div>

      <div class="profile-card">
        <div class="profile-card-title">🎨 選擇頭像</div>
        <div class="avatar-grid" id="avatar-grid"></div>
      </div>

      <div class="profile-card">
        <div class="profile-card-title">🔊 音效設定</div>
        <div class="sound-row">
          <div>
            <div class="sound-label">練習音效</div>
            <div class="sound-sub">關閉後練習時不會有聲音</div>
          </div>
          <button class="sound-toggle" id="sound-toggle" onclick="toggleSound()">
            <div class="sound-toggle-knob" id="sound-toggle-knob" style="left:3px"></div>
          </button>
        </div>
      </div>

      <div class="profile-card">
        <div class="profile-card-title">🎨 主題色系</div>
        <div class="theme-grid" id="theme-grid"></div>
      </div>

      <button class="btn-profile-save" onclick="saveProfile()">💾 儲存資料</button>

      <div class="logout-row">
        <span style="font-size:.85rem;color:var(--muted);font-weight:600">
          登入中：<strong id="logout-name" style="color:var(--text)">—</strong>
        </span>
        <button class="btn-logout" onclick="doLogout()">登出</button>
      </div>

    </div>
  </div>

</div><!-- end app-shell -->

<!-- 教師登入彈窗 -->
<div id="teacher-modal">
  <div class="teacher-modal-box">
    <div class="teacher-modal-title">🔐 教師入口</div>
    <div class="teacher-modal-error" id="teacher-error"></div>
    <input class="teacher-modal-input" id="teacher-pwd" type="password"
      placeholder="請輸入密碼" onkeydown="if(event.key==='Enter')doTeacherLogin()">
    <div class="teacher-modal-btns">
      <button class="btn-modal-cancel" onclick="closeTeacherModal()">取消</button>
      <button class="btn-modal-ok" onclick="doTeacherLogin()">進入後台</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="shared.js"></script>
<script>
'use strict';

/* ════════════════════════════════════
   科目清單 — 新增項目只改這裡
   ════════════════════════════════════
   每筆：
     id       唯一識別碼
     file     子頁面 HTML 路徑
     icon     顯示的 emoji
     name     科目名稱
     desc     簡短說明
     theme    主題 class（theme-blue / theme-green / theme-orange）
     badge    狀態標籤文字
     badgeClass  green / orange
     title    打開後 topbar 顯示的標題 HTML
*/
var SUBJECTS = [
  {
    id:         'chinese',
    file:       'chinese.html',
    icon:       '🈶',
    name:       '國字練習',
    desc:       '筆順練習・默寫測驗',
    theme:      'theme-blue',
    badge:      '可以練習',
    badgeClass: 'green',
    title:      '✏️ <span>國字練習</span>'
  }
  /* 新增項目範例：
  ,{
    id:         'math',
    file:       'math.html',
    icon:       '✖️',
    name:       '乘法練習',
    desc:       '選擇題・填空題',
    theme:      'theme-orange',
    badge:      '可以練習',
    badgeClass: 'green',
    title:      '✖️ <span>乘法練習</span>'
  }
  */
];

/* ════════════════════════════════════
   狀態
   ════════════════════════════════════ */
var currentStudent = null;
var loginPin = '';
var selectedAvatar = '🐣';

var AVATARS = ['🐣','🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨',
               '🐯','🦁','🐮','🐸','🐵','🐧','🐦','🦋','🌟','🌈'];

var ADMIN_PASSWORD = '381418';

/* ════════════════════════════════════
   登入
   ════════════════════════════════════ */
function onLoginInput() {
  updateLoginBtn();
}

function pinInput(d) {
  if (loginPin.length >= 4) return;
  loginPin += d;
  updatePinDisplay();
  if (loginPin.length === 4) {
    updateLoginBtn();
    // 4位數自動嘗試登入
    document.getElementById('btn-login').disabled = false;
  }
}

function pinDel() {
  loginPin = loginPin.slice(0, -1);
  updatePinDisplay();
  updateLoginBtn();
}

function updatePinDisplay() {
  for (var i = 0; i < 4; i++) {
    var dot = document.getElementById('pd' + i);
    if (dot) dot.classList.toggle('filled', i < loginPin.length);
  }
}

function updateLoginBtn() {
  var name = document.getElementById('login-name').value.trim();
  var btn = document.getElementById('btn-login');
  btn.disabled = !(name && loginPin.length === 4);
}

function doLogin() {
  var name = document.getElementById('login-name').value.trim();
  if (!name || loginPin.length < 4) return;
  var btn = document.getElementById('btn-login');
  btn.disabled = true;
  btn.textContent = '登入中…';
  setLoginError('');

  (function waitDb() {
    if (!db) { setTimeout(waitDb, 200); return; }
    var id = name + '_' + loginPin;
    db.collection('students').doc(id).get().then(function(doc) {
      if (!doc.exists) {
        // 嘗試新建帳號
        return db.collection('students').doc(id).set({
          name: name, pin: loginPin,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        }).then(function() {
          return db.collection('students').doc(id).get();
        });
      }
      return doc;
    }).then(function(doc) {
      var data = doc.data ? doc.data() : {};
      var student = {
        id:       name + '_' + loginPin,
        name:     name,
        pin:      loginPin,
        nickname: data.nickname || '',
        avatar:   data.avatar   || '🐣'
      };
      onLoginSuccess(student);
    }).catch(function(e) {
      setLoginError('登入失敗，請再試一次');
      btn.disabled = false;
      btn.textContent = '登入';
    });
  })();
}

function setLoginError(msg) {
  document.getElementById('login-error').textContent = msg;
}

function onLoginSuccess(student) {
  currentStudent = student;
  loginPin = '';
  updatePinDisplay();
  document.getElementById('btn-login').disabled = true;
  document.getElementById('btn-login').textContent = '登入';
  document.getElementById('login-name').value = '';

  // 更新主 UI
  updateHubUI();

  // 登入畫面隱藏，主系統顯示
  document.getElementById('screen-login').classList.add('hidden');
  document.getElementById('app-shell').classList.add('visible');

  showToast('👋 歡迎 ' + (student.nickname || student.name) + '！');
}

/* ════════════════════════════════════
   主頁
   ════════════════════════════════════ */
function updateHubUI() {
  var name = currentStudent.nickname || currentStudent.name;
  var avatar = currentStudent.avatar || '🐣';
  document.getElementById('topbar-avatar').textContent = avatar;
  document.getElementById('topbar-name').textContent = name;
  document.getElementById('hub-avatar').textContent = avatar;
  document.getElementById('hub-name').textContent = name;
  document.getElementById('logout-name').textContent = currentStudent.name;
  renderSubjects();
}

function renderSubjects() {
  var grid = document.getElementById('subjects-grid');
  grid.innerHTML = SUBJECTS.map(function(s) {
    return '<div class="subject-card ' + s.theme + '" onclick="openSubject(\'' + s.id + '\')">'
      + '<div class="subject-icon">' + s.icon + '</div>'
      + '<div class="subject-name">' + s.name + '</div>'
      + '<div class="subject-desc">' + s.desc + '</div>'
      + '<div class="subject-badge ' + s.badgeClass + '">' + s.badge + '</div>'
      + '</div>';
  }).join('');
}

/* ════════════════════════════════════
   子項目（iframe）
   ════════════════════════════════════ */
function openSubject(id) {
  var s = SUBJECTS.find(function(x) { return x.id === id; });
  if (!s || !currentStudent) return;

  // 設定主系統 topbar 的標題
  document.getElementById('subject-topbar-title').innerHTML = s.title;

  // 把學生資料存進 sessionStorage，子頁面從這裡讀
  sessionStorage.setItem('hub_student', JSON.stringify(currentStudent));

  // 開啟 iframe
  var iframe = document.getElementById('subject-iframe');
  iframe.src = s.file;

  // 顯示子項目外殼（含主系統 topbar）
  document.getElementById('subject-shell').classList.add('open');
}

function closeSubject() {
  var shell = document.getElementById('subject-shell');
  var iframe = document.getElementById('subject-iframe');
  shell.classList.remove('open');
  // 清空 iframe，避免背景繼續執行
  setTimeout(function() { iframe.src = ''; }, 300);
}

/* ════════════════════════════════════
   個人設定
   ════════════════════════════════════ */
function openProfile() {
  if (!currentStudent) return;
  updateProfileUI();
  document.getElementById('screen-profile').classList.add('open');
}

function closeProfile() {
  document.getElementById('screen-profile').classList.remove('open');
}

function updateProfileUI() {
  document.getElementById('profile-real-name').textContent = currentStudent.name;
  document.getElementById('profile-nickname').value = currentStudent.nickname || '';
  selectedAvatar = currentStudent.avatar || '🐣';
  renderAvatarGrid();
  renderThemeGrid();
  applySoundUI();
}

function renderAvatarGrid() {
  var grid = document.getElementById('avatar-grid');
  grid.innerHTML = AVATARS.map(function(av) {
    return '<button class="avatar-btn' + (av === selectedAvatar ? ' selected' : '') + '"'
      + ' onclick="selectAvatar(\'' + av + '\')">' + av + '</button>';
  }).join('');
}

function selectAvatar(av) {
  selectedAvatar = av;
  renderAvatarGrid();
}

function renderThemeGrid() {
  var themes = [
    { id:'blue',   name:'藍天',   bg:'#eef5fc', color:'#2d6fa8' },
    { id:'green',  name:'森林',   bg:'#edfbf4', color:'#1e8449' },
    { id:'purple', name:'薰衣草', bg:'#f3f0fc', color:'#6c3483' },
    { id:'orange', name:'夕陽',   bg:'#fff8f0', color:'#ca6f1e' },
    { id:'teal',   name:'青空',   bg:'#f0fafa', color:'#0e6655' },
    { id:'pink',   name:'粉紅',   bg:'#fff0f8', color:'#a0255e' },
  ];
  var cur = localStorage.getItem('theme') || 'blue';
  var grid = document.getElementById('theme-grid');
  grid.innerHTML = themes.map(function(t) {
    return '<button class="theme-btn' + (t.id === cur ? ' selected' : '') + '"'
      + ' style="background:' + t.bg + ';color:' + t.color + '"'
      + ' onclick="selectTheme(\'' + t.id + '\')">' + t.name + '</button>';
  }).join('');
}

function selectTheme(id) {
  applyTheme(id);
  renderThemeGrid();
}

function applySoundUI() {
  var on = soundEnabled;
  var toggle = document.getElementById('sound-toggle');
  var knob = document.getElementById('sound-toggle-knob');
  if (toggle) toggle.style.background = on ? 'var(--blue)' : '#d1d5db';
  if (knob)   knob.style.left = on ? '27px' : '3px';
}

function saveProfile() {
  if (!currentStudent || !db) return;
  var nickname = document.getElementById('profile-nickname').value.trim();
  currentStudent.nickname = nickname;
  currentStudent.avatar   = selectedAvatar;

  db.collection('students').doc(currentStudent.id).set({
    nickname: nickname,
    avatar:   selectedAvatar
  }, { merge: true }).then(function() {
    showToast('✅ 資料已儲存！');
    updateHubUI();
    closeProfile();
  }).catch(function() {
    showToast('❌ 儲存失敗，請重試');
  });
}

/* ════════════════════════════════════
   登出
   ════════════════════════════════════ */
function doLogout() {
  currentStudent = null;
  sessionStorage.removeItem('hub_student');
  closeSubject();
  closeProfile();
  document.getElementById('app-shell').classList.remove('visible');
  document.getElementById('screen-login').classList.remove('hidden');
  showToast('已登出，掰掰！👋');
}

/* ════════════════════════════════════
   教師入口
   ════════════════════════════════════ */
function openTeacherModal() {
  document.getElementById('teacher-pwd').value = '';
  document.getElementById('teacher-error').textContent = '';
  document.getElementById('teacher-modal').classList.add('open');
  setTimeout(function() { document.getElementById('teacher-pwd').focus(); }, 100);
}

function closeTeacherModal() {
  document.getElementById('teacher-modal').classList.remove('open');
}

function doTeacherLogin() {
  var pwd = document.getElementById('teacher-pwd').value;
  if (pwd === ADMIN_PASSWORD) {
    sessionStorage.setItem('adminAuth', ADMIN_PASSWORD);
    window.location.href = 'admin.html';
  } else {
    document.getElementById('teacher-error').textContent = '密碼錯誤';
  }
}

/* ════════════════════════════════════
   音效開關
   ════════════════════════════════════ */
function toggleSound() {
  soundEnabled = !soundEnabled;
  localStorage.setItem('soundEnabled', soundEnabled ? '1' : '0');
  applySoundUI();
}

/* ════════════════════════════════════
   Toast
   ════════════════════════════════════ */
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2800);
}

/* ════════════════════════════════════
   啟動
   ════════════════════════════════════ */
window.addEventListener('load', function() {
  initFirebase();
  applyTheme(currentTheme);
  applySoundUI();
});
</script>
</body>
</html>
