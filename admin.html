<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>太平國小｜教師管理後台</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<link rel="stylesheet" href="admin.css">
<style></style>
</head>
<body>



<!-- ══ 後台主畫面 ══ -->
<div id="admin-screen">

  <!-- 頂部列 -->
  <div class="admin-topbar">
    <div class="topbar-brand">
      <div class="topbar-brand-icon">🏫</div>
      <div>
        <div class="topbar-brand-name">太平國小 教師後台</div>
        <div class="topbar-brand-sub">國字學習管理系統</div>
      </div>
    </div>
    <div class="topbar-right">
      <span style="font-size:.82rem;font-weight:700;color:var(--muted)" id="last-update"></span>
      <span style="font-size:.78rem;font-weight:600;color:var(--muted)" id="teacher-email-display"></span>
      <button class="btn-logout" onclick="doLogout()">登出</button>
    </div>
  </div>

  <div class="admin-main">

    <!-- 分頁 -->
    <div class="admin-tabs">
      <button class="admin-tab active" id="tab-classes" onclick="switchTab('classes')">🏫 班級管理</button>
    </div>

    <!-- 班級管理 -->
    <div id="panel-classes">

      <!-- 子視圖①：班級列表 -->
      <div id="classes-list-view">
        <div class="card">
          <div class="card-title">🏫 我的班級
            <button class="btn-save-lesson" style="margin-left:auto;padding:8px 16px;font-size:.82rem" onclick="showCreateClassModal()">＋ 新增班級</button>
          </div>
          <div id="classes-wrap">
            <div class="loading-wrap"><div class="spinner"></div></div>
          </div>
        </div>
      </div>

      <!-- 子視圖②：班級學生名單 -->
      <div id="class-roster-view" style="display:none">
        <div class="stats-row">
          <div class="stat-card stat-blue">
            <div class="stat-num" id="roster-stat-total">—</div>
            <div class="stat-lbl">班級學生</div>
          </div>
          <div class="stat-card stat-green">
            <div class="stat-num" id="roster-stat-active">—</div>
            <div class="stat-lbl">今日活躍</div>
          </div>
          <div class="stat-card stat-yellow">
            <div class="stat-num" id="roster-stat-mastered">—</div>
            <div class="stat-lbl">平均通過字數</div>
          </div>
        </div>
        <div class="card">
          <div class="card-title">
            <button class="back-btn" style="margin:0;padding:0" onclick="backToClasses()">← 返回班級</button>
            <span id="roster-class-name" style="margin-left:10px;font-weight:900"></span>
            <button onclick="refreshRoster()" style="margin-left:auto;padding:5px 12px;border:1.5px solid var(--border);border-radius:7px;background:white;font-size:.8rem;font-weight:700;cursor:pointer;font-family:inherit">🔄 重新整理</button>
          </div>
          <div id="class-roster-wrap">
            <div class="loading-wrap"><div class="spinner"></div></div>
          </div>
        </div>
      </div>

    </div>

    <!-- 課程管理已移至管理者後台 (super-admin.html) -->

    <!-- 學生詳細頁 -->
    <div id="panel-student" style="display:none">
      <button class="back-btn" onclick="backToOverview()">← 返回班級總覽</button>
      <div class="student-detail-header">
        <div class="student-avatar" id="detail-avatar"></div>
        <div class="student-name-wrap">
          <div class="name" id="detail-name"></div>
          <div class="sub" id="detail-sub"></div>
        </div>
        <div style="margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <button class="btn-danger" onclick="deleteStudent()">🗑 刪除學生</button>
        </div>
      </div>

      <!-- PIN 碼查詢 -->
      <div class="card" style="margin-bottom:14px">
        <div class="card-title">🔐 PIN 碼查詢</div>
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
          <span style="font-size:.88rem;font-weight:700;color:var(--gray)">學生的 PIN 碼：</span>
          <div class="pin-display-box" id="detail-pin">—</div>
          <span style="font-size:.8rem;color:var(--muted);font-weight:600">（可告知學生讓他登入）</span>
        </div>
      </div>

      <!-- 課程完成狀況 -->
      <div class="card" style="margin-bottom:14px">
        <div class="card-title">📚 課程完成狀況</div>
        <div id="detail-course-progress">
          <div class="loading-wrap"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- 最近測驗紀錄 -->
      <div class="card">
        <div class="card-title">🕐 最近測驗紀錄</div>
        <div id="detail-activities">
          <div class="loading-wrap"><div class="spinner"></div></div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- 新增班級 Modal -->
<div id="class-modal" style="display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px">
  <div style="background:white;border-radius:20px;padding:28px 24px;max-width:380px;width:100%;box-shadow:0 16px 48px rgba(0,0,0,.2)">
    <div style="font-size:1.1rem;font-weight:900;margin-bottom:20px">🏫 新增班級</div>
    <label style="font-size:.78rem;font-weight:800;color:var(--muted);display:block;margin-bottom:6px">班級名稱</label>
    <input id="new-class-name" type="text" placeholder="例如：三年甲班、資源班 112 學年"
      maxlength="30"
      style="width:100%;border:2px solid var(--border);border-radius:10px;padding:10px 14px;font-size:.95rem;font-family:inherit;outline:none;margin-bottom:8px"
      onkeydown="if(event.key==='Enter')createClass()">
    <div id="class-modal-error" style="font-size:.82rem;font-weight:700;color:var(--red);min-height:20px;margin-bottom:12px"></div>
    <div style="display:flex;gap:10px">
      <button onclick="hideCreateClassModal()"
        style="flex:1;padding:11px;border:2px solid var(--border);border-radius:10px;background:var(--gray-lt);font-size:.9rem;font-weight:800;cursor:pointer;font-family:inherit;color:var(--gray)">取消</button>
      <button id="btn-create-class" onclick="createClass()"
        style="flex:2;padding:11px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--blue-dk));color:white;font-size:.9rem;font-weight:900;cursor:pointer;font-family:inherit">建立班級</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="shared.js"></script>
<script src="admin/init.js"></script>
<script src="admin/classes.js"></script>
<script src="admin/overview.js"></script>
<script src="admin/students.js"></script>
</body>
</html>
